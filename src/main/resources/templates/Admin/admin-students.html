<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ELMS – Students</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root { --bg:#0f0f13; --sidebar:#0a0a0e; --card:#16161d; --card2:#1c1c26; --green:#2db55d; --green2:#1a8a40; --blue:#3b82f6; --purple:#8b5cf6; --orange:#f59e0b; --red:#ef4444; --cyan:#06b6d4; --muted:#9ca3af; --border:#2a2a3a; --text:#f1f5f9; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { background:var(--bg); color:var(--text); font-family:'Inter',-apple-system,sans-serif; font-size:14px; }

        .sidebar { position:fixed; top:0; left:0; width:240px; height:100vh; background:var(--sidebar); border-right:1px solid var(--border); display:flex; flex-direction:column; z-index:300; transition:transform 0.3s, width 0.3s; }
        .sidebar.collapsed { width:64px; }
        .sidebar.collapsed .brand-sub,
        .sidebar.collapsed .admin-name,
        .sidebar.collapsed .admin-role { display:none; }
        .sidebar.collapsed .nav-link-item { justify-content:center; font-size:0; padding:11px 0; }
        .sidebar.collapsed .nav-link-item i { font-size:0.9rem; }
        .sidebar.collapsed .nav-section-label { display:none; }
        .sidebar.collapsed .admin-mini-card { justify-content:center; padding:10px; }
        .sidebar-header { padding:18px 14px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
        .sidebar-toggle { background:none; border:none; color:var(--muted); cursor:pointer; font-size:1rem; padding:5px 7px; border-radius:7px; transition:0.2s; flex-shrink:0; margin-left:auto; }
        .sidebar-toggle:hover { color:#fff; background:rgba(255,255,255,0.07); }
        .brand { font-size:1.4rem; font-weight:900; color:#fff; } .brand span { color:var(--green); }
        .brand-sub { font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }
        .sidebar-nav { flex:1; padding:16px 12px; overflow-y:auto; }
        .nav-section-label { color:#4a4a6a; font-size:0.65rem; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; padding:12px 8px 6px; margin-top:8px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
        .nav-section-label i { font-size:0.62rem; transition:transform 0.2s ease; }
        .nav-link-item { display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:10px; color:var(--muted); text-decoration:none; font-size:0.86rem; font-weight:500; transition:all 0.2s; margin-bottom:2px; position:relative; }
        .nav-link-item i { width:18px; text-align:center; font-size:0.9rem; flex-shrink:0; }
        .nav-link-item:hover { color:#fff; background:rgba(255,255,255,0.05); }
        .nav-link-item.active { color:#fff; background:linear-gradient(135deg,rgba(45,181,93,0.2),rgba(45,181,93,0.05)); }
        .nav-link-item.active i { color:var(--green); }
        .nav-link-item.active::before { content:''; position:absolute; left:0; top:50%; transform:translateY(-50%); width:3px; height:60%; background:var(--green); border-radius:0 3px 3px 0; }
        .nav-badge { margin-left:auto; background:var(--red); color:#fff; font-size:0.65rem; font-weight:700; padding:2px 7px; border-radius:10px; }
        .nav-link-item.logout { color:#ef4444; } .nav-link-item.logout:hover { background:rgba(239,68,68,0.1); }
        .sidebar-footer { padding:16px; border-top:1px solid var(--border); }
        .admin-mini-card { background:var(--card); border-radius:10px; padding:12px; display:flex; align-items:center; gap:10px; }
        .admin-avatar { width:36px; height:36px; border-radius:10px; background:linear-gradient(135deg,var(--green),var(--green2)); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:1rem; color:#fff; flex-shrink:0; }
        .admin-name { font-weight:600; font-size:0.82rem; color:#fff; } .admin-role { font-size:0.7rem; color:var(--muted); }

        .topbar { position:fixed; top:0; left:240px; right:0; height:64px; background:rgba(15,15,19,0.95); backdrop-filter:blur(10px); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 28px; gap:16px; z-index:200; transition:left 0.3s; }
        .topbar.sb-collapsed { left:64px; }
        .topbar-title { font-weight:700; font-size:1.1rem; flex:1; }
        .topbar-title span { color:var(--muted); font-weight:400; font-size:0.82rem; margin-left:8px; }
        .search-bar { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:8px 14px; display:flex; align-items:center; gap:8px; width:220px; }
        .search-bar input { background:transparent; border:none; outline:none; color:#fff; font-size:0.82rem; width:100%; }
        .search-bar input::placeholder { color:#4a4a6a; }
        .search-bar i { color:#4a4a6a; font-size:0.8rem; }
        .icon-btn { width:38px; height:38px; border-radius:10px; background:var(--card); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; color:#fff; transition:0.2s; position:relative; }
        .icon-btn:hover { border-color:#888; background:rgba(255,255,255,0.12); }
        .sidebar.collapsed .nav-link-item i { color:#fff !important; font-size:0.95rem; }
        .notif-dot { position:absolute; top:7px; right:7px; width:8px; height:8px; background:var(--red); border-radius:50%; border:2px solid var(--bg); }

        .main { margin-left:240px; margin-top:64px; padding:28px; transition:margin-left 0.3s; }
        .main.sb-collapsed { margin-left:64px; }

        /* Stat row */
        .mini-stat { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px 18px; display:flex; align-items:center; gap:14px; }
        .mini-stat-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0; }
        .mini-stat-value { font-size:1.5rem; font-weight:900; line-height:1; }
        .mini-stat-label { font-size:0.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.4px; font-weight:600; margin-top:3px; }

        /* Filter bar */
        .filter-bar { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 18px; margin-bottom:22px; display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
        .filter-search { background:var(--card2); border:1px solid var(--border); border-radius:9px; padding:8px 14px; color:#fff; font-size:0.84rem; outline:none; flex:1; min-width:180px; }
        .filter-search::placeholder { color:#4a4a6a; }
        .filter-select { background:var(--card2); border:1px solid var(--border); color:var(--muted); border-radius:9px; padding:8px 14px; font-size:0.84rem; outline:none; cursor:pointer; }

        /* Table */
        .table-card { background:var(--card); border:1px solid var(--border); border-radius:16px; overflow:hidden; }
        .tbl { width:100%; border-collapse:collapse; }
        .tbl thead th { padding:12px 18px; font-size:0.7rem; font-weight:700; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--border); background:rgba(255,255,255,0.02); white-space:nowrap; }
        .tbl tbody td { padding:14px 18px; font-size:0.84rem; border-bottom:1px solid var(--border); vertical-align:middle; }
        .tbl tbody tr:last-child td { border-bottom:none; }
        .tbl tbody tr:hover td { background:rgba(255,255,255,0.02); }

        .student-avatar { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.9rem; color:#fff; flex-shrink:0; }
        .prog-badge { background:#1a2a3a; color:var(--cyan); border-radius:8px; padding:4px 12px; font-size:0.72rem; font-weight:700; display:inline-block; }
        .profile-btn { background:linear-gradient(135deg,#3b82f6,#2563eb); color:#fff; border:none; padding:6px 14px; border-radius:8px; font-weight:700; text-decoration:none; font-size:0.74rem; display:inline-flex; align-items:center; gap:5px; transition:opacity 0.2s; }
        .profile-btn:hover { opacity:0.85; color:#fff; }

        .counter-pill { background:rgba(45,181,93,0.1); color:var(--green); border-radius:8px; padding:4px 12px; font-size:0.78rem; font-weight:700; }

        .empty-row td { text-align:center; padding:50px 20px; color:var(--muted); }

        /* Avatar colors */
        .av-0 { background: linear-gradient(135deg,#2db55d,#1a8a40); }
        .av-1 { background: linear-gradient(135deg,#3b82f6,#1d4ed8); }
        .av-2 { background: linear-gradient(135deg,#8b5cf6,#6d28d9); }
        .av-3 { background: linear-gradient(135deg,#f59e0b,#b45309); }
        .av-4 { background: linear-gradient(135deg,#06b6d4,#0e7490); }
        .av-5 { background: linear-gradient(135deg,#ef4444,#b91c1c); }

        .hamburger { display: flex; }
        @media (max-width:992px) {
            .sidebar { transform:translateX(-100%); width:240px !important; }
            .sidebar.open { transform:translateX(0); }
            .main, .topbar { margin-left:0 !important; left:0 !important; }
        }
        @media (max-width:768px) { .main { padding:16px; } .search-bar { display:none; } }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:299;" onclick="toggleSidebar()"></div>

<!-- ══ SIDEBAR ══ -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div>
            <div class="brand">ELM<span>S</span></div>
            <div class="brand-sub">Learning Management System</div>
        </div>
        <button class="sidebar-toggle" onclick="collapseSidebar()" title="Collapse"><i class="fas fa-bars"></i></button>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section-label" onclick="toggleNavSection(this)">Main <i class="fas fa-chevron-down"></i></div>
        <a href="/web/admin/dashboard" class="nav-link-item"><i class="fas fa-chart-pie"></i> Dashboard</a>
        <a href="/web/admin/courses"   class="nav-link-item"><i class="fas fa-book-open"></i> Courses</a>
        <a href="/web/admin/students"  class="nav-link-item active"><i class="fas fa-user-graduate"></i> Students</a>
        <div class="nav-section-label" onclick="toggleNavSection(this)">Academics <i class="fas fa-chevron-down"></i></div>
        <a href="/web/admin/attendance" class="nav-link-item"><i class="fas fa-calendar-check"></i> Attendance</a>
        <a href="/web/admin/analytics" class="nav-link-item"><i class="fas fa-chart-bar"></i> Analytics</a>
        <div class="nav-section-label" onclick="toggleNavSection(this)">System <i class="fas fa-chevron-down"></i></div>
        <a href="/web/admin/profile" class="nav-link-item"><i class="fas fa-user-shield"></i> Profile</a>
        <a href="/web/admin/settings" class="nav-link-item"><i class="fas fa-cog"></i> Settings</a>
        <a href="#" class="nav-link-item logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
    <div class="sidebar-footer">
        <div class="admin-mini-card">
            <div class="admin-avatar" id="sidebarAvatar">A</div>
            <div><div class="admin-name" id="sidebarName">Admin</div><div class="admin-role">Administrator</div></div>
        </div>
    </div>
</div>

<!-- ══ TOPBAR ══ -->
<div class="topbar" id="topbar">
    <button class="icon-btn hamburger me-2" onclick="smartToggleSidebar()" title="Toggle Sidebar"><i class="fas fa-bars" style="color:#fff;font-size:1rem;"></i></button>
    <div class="topbar-title">Students <span>/ Records</span></div>
    <div class="search-bar"><i class="fas fa-search"></i><input placeholder="Search students…" oninput="filterStudents(this.value)"></div>
    <div class="icon-btn"><i class="fas fa-bell" style="color:#f59e0b;font-size:1rem;"></i><div class="notif-dot"></div></div>
    <div class="icon-btn" onclick="window.location='/web/admin/profile'"><i class="fas fa-user-shield" style="color:#2db55d;font-size:1rem;"></i></div>
</div>

<!-- ══ MAIN ══ -->
<div class="main" id="mainArea">

    <!-- Mini stats -->
    <div class="row g-3 mb-4">
        <div class="col-md-3 col-6">
            <div class="mini-stat">
                <div class="mini-stat-icon" style="background:rgba(45,181,93,0.15); color:var(--green);"><i class="fas fa-users"></i></div>
                <div><div class="mini-stat-value" id="totalStudents">0</div><div class="mini-stat-label">Total Students</div></div>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="mini-stat">
                <div class="mini-stat-icon" style="background:rgba(59,130,246,0.15); color:var(--blue);"><i class="fas fa-user-check"></i></div>
                <div><div class="mini-stat-value" id="visibleCount">0</div><div class="mini-stat-label">Showing</div></div>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="mini-stat">
                <div class="mini-stat-icon" style="background:rgba(139,92,246,0.15); color:var(--purple);"><i class="fas fa-graduation-cap"></i></div>
                <div><div class="mini-stat-value" id="programCount">–</div><div class="mini-stat-label">Programs</div></div>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="mini-stat">
                <div class="mini-stat-icon" style="background:rgba(245,158,11,0.15); color:var(--orange);"><i class="fas fa-user-plus"></i></div>
                <div><div class="mini-stat-value" id="activeCount">0</div><div class="mini-stat-label">Active</div></div>
            </div>
        </div>
        <div class="col-md-3 col-6" style="display:none;" id="gradDropStats"><!-- placeholder --></div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
        <i class="fas fa-filter" style="color:var(--muted);"></i>
        <input class="filter-search" id="mainSearch" placeholder="Search by name, email, program…" oninput="filterStudents(this.value)">
        <select class="filter-select" id="programFilter" onchange="filterStudents(document.getElementById('mainSearch').value)">
            <option value="">All Programs</option>
        </select>
        <select class="filter-select" id="statusFilter" onchange="filterStudents(document.getElementById('mainSearch').value)">
            <option value="">All Statuses</option>
            <option value="ACTIVE">Active</option>
            <option value="GRADUATED">Graduated</option>
            <option value="DROPPED">Dropped</option>
        </select>
        <span class="counter-pill" id="studentCounter">0 Students</span>
        <button onclick="loadStudents()" style="margin-left:auto; background:linear-gradient(135deg,#3b82f6,#2563eb); color:#fff; border:none; border-radius:10px; padding:9px 18px; font-weight:700; font-size:0.8rem; cursor:pointer; display:flex; align-items:center; gap:7px;">
            <i class="fas fa-sync-alt"></i> Refresh
        </button>
    </div>

    <!-- Table -->
    <div class="table-card">
        <div style="overflow-x:auto;">
            <table class="tbl">
                <thead>
                    <tr>
                        <th>Student</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Program</th>
                        <th>Status</th>
                        <th>ID</th>
                        <th class="text-end">Action</th>
                    </tr>
                </thead>
                <tbody id="studentsBody">
                    <tr class="empty-row">
                        <td colspan="7">
                            <div style="text-align:center; padding:50px 20px;">
                                <i class="fas fa-spinner fa-spin" style="font-size:2rem; color:var(--cyan); display:block; margin-bottom:12px;"></i>
                                <div style="color:var(--muted);">Loading students...</div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script th:inline="javascript">
    // Apply theme from settings
    (function applyTheme() {
        const theme = localStorage.getItem('uiTheme') || 'DARK';
        const accent = localStorage.getItem('accentColor') || '#2db55d';
        const r = document.documentElement;
        r.style.setProperty('--green', accent);
        r.style.setProperty('--green2', accent);
        if (theme === 'LIGHT') {
            r.style.setProperty('--bg', '#f8fafc');
            r.style.setProperty('--sidebar', '#ffffff');
            r.style.setProperty('--card', '#ffffff');
            r.style.setProperty('--card2', '#f1f5f9');
            r.style.setProperty('--text', '#0f172a');
            r.style.setProperty('--muted', '#64748b');
            r.style.setProperty('--border', '#dbeafe');
        } else if (theme === 'AMOLED') {
            r.style.setProperty('--bg', '#000');
            r.style.setProperty('--sidebar', '#000');
            r.style.setProperty('--card', '#0b0b10');
            r.style.setProperty('--card2', '#111117');
            r.style.setProperty('--text', '#f8fafc');
            r.style.setProperty('--muted', '#94a3b8');
            r.style.setProperty('--border', '#1f2937');
        }
    })();

    const token = localStorage.getItem('token');
    const role  = localStorage.getItem('role');
    const name  = localStorage.getItem('name') || 'Admin';
    if (!token || role !== 'ADMIN') window.location.href = '/login';

    document.getElementById('sidebarName').textContent   = name;
    document.getElementById('sidebarAvatar').textContent = name.charAt(0).toUpperCase();

    const AUTH = { 'Authorization': 'Bearer ' + token };

    /* ── Load Students from API ── */
    async function loadStudents() {
        try {
            const res = await fetch('/api/students/all', { headers: AUTH });
            if (!res.ok) throw new Error('Failed to fetch students');
            
            const students = await res.json();
            renderStudents(students);
            updateStats(students);
        } catch (e) {
            console.error('Error loading students:', e);
            document.getElementById('studentsBody').innerHTML = `
                <tr class="empty-row">
                    <td colspan="6">
                        <div style="text-align:center; padding:50px 20px; color:var(--red);">
                            <i class="fas fa-exclamation-circle" style="font-size:2rem; display:block; margin-bottom:12px;"></i>
                            <div>Failed to load students. Please refresh the page.</div>
                        </div>
                    </td>
                </tr>`;
        }
    }

    function renderStudents(students) {
        const tbody = document.getElementById('studentsBody');
        tbody.innerHTML = '';

        if (!students || students.length === 0) {
            tbody.innerHTML = `
                <tr class="empty-row" id="emptyRow">
                    <td colspan="7">
                        <div style="text-align:center; padding:50px 20px;">
                            <i class="fas fa-users" style="font-size:2rem; color:#2a2a3a; display:block; margin-bottom:12px;"></i>
                            <div style="color:var(--muted);">No students registered yet.</div>
                        </div>
                    </td>
                </tr>`;
            return;
        }

        const avatarColors = ['av-0', 'av-1', 'av-2', 'av-3', 'av-4', 'av-5'];
        
        students.forEach((student, idx) => {
            const userEmail = student.email || '—';
            const phone = student.phone || '—';
            const program = student.program || 'N/A';
            const studentId = student.studentId || '#—';
            const avatarClass = avatarColors[idx % 6];
            const firstName = student.name ? student.name.charAt(0).toUpperCase() : 'S';
            
            const row = document.createElement('tr');
            row.className = 'student-row';
            row.setAttribute('data-name', student.name || '');
            row.setAttribute('data-email', userEmail);
            row.setAttribute('data-program', program);
            const status = student.status || 'ACTIVE';
            row.setAttribute('data-status', status);
            const statusColor = status === 'ACTIVE' ? 'var(--green)' : status === 'GRADUATED' ? 'var(--blue)' : 'var(--red)';
            const statusBg    = status === 'ACTIVE' ? 'rgba(45,181,93,0.1)' : status === 'GRADUATED' ? 'rgba(59,130,246,0.1)' : 'rgba(239,68,68,0.1)';
            const statusIcon  = status === 'ACTIVE' ? 'fa-circle' : status === 'GRADUATED' ? 'fa-graduation-cap' : 'fa-user-times';

            row.innerHTML = `
                <td>
                    <div class="d-flex align-items-center gap-12" style="gap:12px;">
                        <div class="student-avatar ${avatarClass}">${firstName}</div>
                        <div>
                            <div style="font-weight:700; color:#fff;">${student.name || 'Unknown'}</div>
                            <div style="font-size:0.72rem; color:var(--muted);">Student</div>
                        </div>
                    </div>
                </td>
                <td style="color:var(--muted);">${userEmail}</td>
                <td style="color:var(--muted);">${phone}</td>
                <td><span class="prog-badge">${program}</span></td>
                <td><span style="background:${statusBg};color:${statusColor};border:1px solid ${statusColor}33;border-radius:8px;padding:4px 10px;font-size:0.72rem;font-weight:700;display:inline-flex;align-items:center;gap:5px;"><i class="fas ${statusIcon}" style="font-size:0.6rem;"></i>${status}</span></td>
                <td style="color:var(--green); font-weight:700; font-size:0.8rem;">#${studentId}</td>
                <td class="text-end" style="white-space:nowrap;">
                    <a href="/web/admin/student-analytics?studentId=${studentId}" class="profile-btn" style="margin-right:4px;">
                        <i class="fas fa-chart-bar"></i> Analytics
                    </a>
                </td>`;
            
            tbody.appendChild(row);
        });
    }

    function updateStats(students) {
        const programs = new Set();
        let active = 0, graduated = 0, dropped = 0;
        students.forEach(s => {
            if (s.program) programs.add(s.program);
            if (s.status === 'ACTIVE') active++;
            else if (s.status === 'GRADUATED') graduated++;
            else if (s.status === 'DROPPED') dropped++;
        });
        
        document.getElementById('totalStudents').textContent = students.length;
        document.getElementById('visibleCount').textContent = students.length;
        document.getElementById('programCount').textContent = programs.size;
        document.getElementById('studentCounter').textContent = students.length + ' Students';
        document.getElementById('activeCount').textContent = active + ' / ' + (graduated ? graduated + ' Grad' : '') + (dropped ? ' / ' + dropped + ' Drop' : '');
        
        /* Populate program filter */
        const sel = document.getElementById('programFilter');
        const existing = sel.querySelectorAll('option');
        existing.forEach((opt, idx) => { if (idx > 0) opt.remove(); });
        programs.forEach(p => { 
            const o = document.createElement('option'); 
            o.value = p; 
            o.textContent = p; 
            sel.appendChild(o); 
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadStudents();
    });

    function filterStudents(q) {
        q = (q || '').toLowerCase();
        const prog   = document.getElementById('programFilter').value;
        const status = document.getElementById('statusFilter').value;
        const rows   = document.querySelectorAll('.student-row');
        let visible  = 0;
        rows.forEach(r => {
            const matchQ = !q || (r.dataset.name||'').toLowerCase().includes(q) || (r.dataset.email||'').toLowerCase().includes(q) || (r.dataset.program||'').toLowerCase().includes(q);
            const matchP = !prog || r.dataset.program === prog;
            const matchS = !status || r.dataset.status === status;
            r.style.display = (matchQ && matchP && matchS) ? '' : 'none';
            if (matchQ && matchP && matchS) visible++;
        });
        document.getElementById('visibleCount').textContent  = visible;
        document.getElementById('studentCounter').textContent = visible + ' Students';
        const emptyRow = document.getElementById('emptyRow');
        if (emptyRow) {
            emptyRow.style.display = visible === 0 ? 'table-row' : 'none';
        }
    }

    function smartToggleSidebar() {
        if (window.innerWidth <= 992) { toggleSidebar(); } else { collapseSidebar(); }
    }
    function collapseSidebar() {
        document.getElementById('sidebar').classList.toggle('collapsed');
        document.getElementById('topbar').classList.toggle('sb-collapsed');
        document.getElementById('mainArea').classList.toggle('sb-collapsed');
    }
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        const ov = document.getElementById('sidebarOverlay');
        ov.style.display = ov.style.display === 'none' ? 'block' : 'none';
    }

    function toggleNavSection(labelEl) {
        const icon = labelEl.querySelector('i');
        const collapse = !labelEl.classList.contains('collapsed');
        labelEl.classList.toggle('collapsed', collapse);
        if (icon) icon.style.transform = collapse ? 'rotate(-90deg)' : 'rotate(0deg)';

        let next = labelEl.nextElementSibling;
        while (next && !next.classList.contains('nav-section-label')) {
            next.style.display = collapse ? 'none' : 'flex';
            next = next.nextElementSibling;
        }
    }
    function logout() { localStorage.clear(); window.location.href = '/login'; }

    async function changeStatus(studentId, action) {
        const label = action === 'complete' ? 'graduate' : 'drop';
        if (!confirm(`Are you sure you want to ${label} this student?`)) return;
        try {
            const res = await fetch(`/api/students/${studentId}/${action}`, {
                method: 'PUT',
                headers: AUTH
            });
            if (res.ok) {
                loadStudents();
            } else {
                alert('Failed to update student status.');
            }
        } catch(e) {
            alert('Error: ' + e.message);
        }
    }
</script>
</body>
