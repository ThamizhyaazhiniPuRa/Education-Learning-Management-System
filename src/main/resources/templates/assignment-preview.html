<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Assignment Preview – ELMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root {
            --bg:#0f0f13; --sidebar:#0a0a0e; --card:#16161d; --card2:#1c1c26;
            --green:#2db55d; --green2:#1a8a40; --blue:#3b82f6; --purple:#8b5cf6;
            --orange:#f59e0b; --red:#ef4444; --cyan:#06b6d4; --yellow:#fbbf24;
            --muted:#9ca3af; --border:#2a2a3a; --text:#f1f5f9;
        }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { background:var(--bg); color:var(--text); font-family:'Inter',-apple-system,sans-serif; font-size:14px; }

        /* ── Topbar ── */
        .topbar {
            background:rgba(10,10,14,0.98); border-bottom:1px solid var(--border);
            padding:0 28px; height:62px; display:flex; align-items:center;
            justify-content:space-between; position:sticky; top:0; z-index:200;
            backdrop-filter:blur(10px);
        }
        .brand { font-size:1.3rem; font-weight:900; color:#fff; }
        .brand span { color:var(--green); }
        .topbar-right { display:flex; align-items:center; gap:10px; }
        .role-badge {
            padding:4px 14px; border-radius:20px; font-size:0.72rem; font-weight:700;
            text-transform:uppercase; letter-spacing:0.5px;
        }
        .role-badge.admin   { background:rgba(139,92,246,0.15); color:var(--purple); border:1px solid rgba(139,92,246,0.3); }
        .btn-back {
            background:var(--card); border:1px solid var(--border); color:var(--muted);
            border-radius:9px; padding:7px 16px; font-size:0.82rem; font-weight:600;
            cursor:pointer; display:flex; align-items:center; gap:7px; text-decoration:none;
            transition:0.2s;
        }
        .btn-back:hover { color:#fff; border-color:#444; }

        /* ── Hero Section ── */
        .preview-hero {
            background:linear-gradient(135deg, #1a1a2a 0%, #0a0a14 100%);
            border-bottom:1px solid var(--border);
            padding:36px;
        }
        .preview-hero h1 { font-size:1.8rem; font-weight:900; margin-bottom:8px; }
        .meta-info {
            display:flex; gap:20px; margin-top:16px; flex-wrap:wrap;
        }
        .meta-pill {
            background:#1c1c30; border:1px solid var(--border); color:var(--cyan);
            border-radius:20px; padding:8px 16px; font-size:0.74rem; font-weight:700;
            display:inline-block;
        }

        /* ── Main Content ── */
        .preview-container {
            max-width:900px; margin:0 auto; padding:36px 20px;
        }

        /* ── Assignment Info Card ── */
        .assignment-info {
            background:var(--card); border:1px solid var(--border);
            border-radius:14px; padding:28px; margin-bottom:24px;
        }
        .assignment-info h3 { font-size:1.1rem; font-weight:800; margin-bottom:16px; color:var(--cyan); }
        .info-row {
            display:flex; justify-content:space-between; padding:12px 0;
            border-bottom:1px solid var(--border);
        }
        .info-row:last-child { border-bottom:none; }
        .info-label { color:var(--muted); font-weight:600; }
        .info-value { font-weight:700; }

        /* ── Questions Section ── */
        .quiz-section {
            margin-top:24px;
        }
        .quiz-header {
            font-size:1.3rem; font-weight:900; margin-bottom:24px;
            color:#fff; padding-bottom:16px; border-bottom:2px solid var(--green);
        }

        /* ── Question Cards ── */
        .quiz-q {
            background:var(--card); border:1px solid var(--border);
            border-radius:14px; padding:24px; margin-bottom:16px;
            transition:border-color 0.2s;
        }
        .quiz-q:hover { border-color:var(--cyan); }
        .q-num {
            color:var(--cyan); font-size:0.7rem; font-weight:800; 
            text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px;
        }
        .q-text {
            font-size:1.02rem; font-weight:700; margin-bottom:20px; 
            color:#ffffff; line-height:1.5;
        }

        /* ── Options ── */
        .opt {
            background:#1e1e28; border:1.5px solid #2a2a3a;
            border-radius:9px; padding:16px; margin-bottom:12px;
            cursor:default; display:flex; align-items:center; gap:12px;
            transition:0.2s; user-select:none;
        }
        .opt.correct {
            border-color:var(--green); background:rgba(45,181,93,0.1); 
            color:var(--green); font-weight:700;
        }
        .opt-label {
            flex-shrink:0; width:32px; height:32px; border-radius:6px;
            background:var(--card2); display:flex; align-items:center; 
            justify-content:center; font-weight:800; color:var(--muted);
        }
        .opt.correct .opt-label {
            background:var(--green); color:#000;
        }
        .opt-text { flex:1; }

        /* ── Admin Badge ── */
        .admin-badge {
            background:rgba(139,92,246,0.15); border:1px solid var(--purple);
            color:var(--purple); padding:8px 16px; border-radius:20px;
            font-size:0.76rem; font-weight:700; display:inline-block;
            margin-bottom:20px;
        }

        /* ── Footer ── */
        .preview-footer {
            margin-top:36px; padding-top:20px; border-top:1px solid var(--border);
            display:flex; justify-content:center;
        }
        .btn-preview-close {
            background:var(--card); border:1px solid var(--border); 
            color:var(--muted); border-radius:9px; padding:11px 24px;
            font-weight:700; font-size:0.86rem; cursor:pointer;
            transition:0.2s;
        }
        .btn-preview-close:hover {
            background:var(--purple); color:#fff; border-color:var(--purple);
        }

        /* ── Loading ── */
        .state-box {
            background:var(--card); border:1px solid var(--border);
            border-radius:14px; padding:60px 40px; text-align:center;
            color:var(--muted);
        }
        .state-box i { font-size:2.5rem; margin-bottom:16px; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="brand">ELM<span>S</span></div>
    <div class="topbar-right">
        <span class="role-badge admin">ADMIN</span>
        <button class="btn-back" onclick="goBackToCourse()">
            <i class="fas fa-arrow-left"></i> Back
        </button>
    </div>
</div>

<div class="preview-hero">
    <h1 id="assignmentTitle">Loading Assignment...</h1>
    <div class="meta-info">
        <div class="meta-pill"><i class="fas fa-calendar-alt me-2"></i>Due: <span id="dueDate">–</span></div>
        <div class="meta-pill"><i class="fas fa-star me-2"></i>Max Score: <span id="maxScore">–</span></div>
    </div>
</div>

<div class="preview-container">
    <div class="admin-badge">
        <i class="fas fa-shield-alt me-2"></i> Admin Preview Mode – Questions & Answers Visible
    </div>

    <div id="assignmentContent">
        <div class="state-box">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Loading assignment details...</p>
        </div>
    </div>

    <div class="preview-footer">
        <button class="btn-preview-close" onclick="goBackToCourse()">
            <i class="fas fa-times me-2"></i> Close Preview
        </button>
    </div>
</div>

<script>
    const params   = new URLSearchParams(window.location.search);
    const assignmentId = params.get('assignmentId') || '';
    const courseId = params.get('courseId') || '';
    const userRole = (localStorage.getItem('role') || 'STUDENT').toUpperCase();
    const token    = localStorage.getItem('token');

    if (!token) window.location.href = '/login';
    if (userRole !== 'ADMIN') window.location.href = '/student/dashboard';

    const AUTH = { 'Authorization':'Bearer ' + token };

    /* ── Load and Display Assignment ── */
    async function loadAssignment() {
        try {
            const res = await fetch(`/api/assignments/${assignmentId}`, { headers: AUTH });
            if (!res.ok) throw new Error('API ' + res.status);
            
            const assignment = await res.json();
            displayAssignment(assignment);
        } catch(e) {
            console.error(e);
            document.getElementById('assignmentContent').innerHTML =
                `<div class="state-box"><i class="fas fa-exclamation-triangle text-danger"></i><p>Failed to load assignment details.</p><p style="font-size:0.8rem; margin-top:8px;">${e.message}</p></div>`;
        }
    }

    function displayAssignment(assignment) {
        // Update header info
        document.getElementById('assignmentTitle').textContent = assignment.title || 'Untitled Assignment';
        
        const due = assignment.dueDate ? new Date(assignment.dueDate).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}) : 'Not Set';
        document.getElementById('dueDate').textContent = due;
        document.getElementById('maxScore').textContent = assignment.maxScore || '–';

        // Parse quiz questions from description
        let quizData = [];
        try {
            quizData = JSON.parse(assignment.description || '[]');
        } catch(e) {
            console.error('Failed to parse quiz data:', e);
        }

        if (!quizData || quizData.length === 0) {
            document.getElementById('assignmentContent').innerHTML =
                `<div class="state-box"><i class="fas fa-file-invoice"></i><p>No questions configured for this assignment.</p></div>`;
            return;
        }

        // Build quiz display
        let html = `
            <div class="assignment-info">
                <h3><i class="fas fa-info-circle me-2"></i>Assignment Information</h3>
                <div class="info-row">
                    <span class="info-label">Assignment ID</span>
                    <span class="info-value">#${assignment.assignmentId}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Title</span>
                    <span class="info-value">${assignment.title || 'Untitled'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Total Questions</span>
                    <span class="info-value">${quizData.length} Questions</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Maximum Score</span>
                    <span class="info-value">${assignment.maxScore} Points</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Due Date</span>
                    <span class="info-value">${due}</span>
                </div>
            </div>

            <div class="quiz-section">
                <div class="quiz-header">
                    <i class="fas fa-vial me-2"></i>Assessment Questions
                </div>`;

        quizData.forEach((q, qIdx) => {
            const correctIndex = q.ans;
            const correctOption = ['A', 'B', 'C', 'D'][correctIndex];
            
            html += `
                <div class="quiz-q">
                    <div class="q-num">Question ${qIdx + 1} of ${quizData.length}</div>
                    <div class="q-text">${q.q}</div>
                    <div>`;

            q.opts.forEach((opt, oIdx) => {
                const isCorrect = oIdx === correctIndex;
                const optLabel = ['A', 'B', 'C', 'D'][oIdx];
                const correctClass = isCorrect ? 'correct' : '';
                const correctMark = isCorrect ? '<i class="fas fa-check-circle ms-2"></i>' : '';
                
                html += `
                    <div class="opt ${correctClass}">
                        <div class="opt-label">${optLabel}</div>
                        <div class="opt-text">${opt}${correctMark}</div>
                    </div>`;
            });

            html += `
                    </div>
                </div>`;
        });

        html += `</div>`;
        document.getElementById('assignmentContent').innerHTML = html;
    }

    function goBackToCourse() {
        if (courseId) {
            window.location.href = `/course?courseId=${courseId}`;
        } else {
            window.location.href = '/web/admin/courses';
        }
    }

    /* ── Initialize ── */
    document.addEventListener('DOMContentLoaded', () => {
        if (!assignmentId) {
            document.getElementById('assignmentContent').innerHTML =
                `<div class="state-box"><i class="fas fa-exclamation-circle"></i><p>No assignment ID provided.</p></div>`;
            return;
        }
        loadAssignment();
    });
</script>

</body>
</html>
